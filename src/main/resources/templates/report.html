<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NBA Data Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f8f9fa; }
        .stat-box { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 12px; text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: 800; color: #0d6efd; margin: 0; }
        .stat-label { font-size: 0.7rem; color: #777; font-weight: bold; }
        .card { border: none; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .analysis-box { background: #fff3cd; border-left: 5px solid #ffc107; border-radius: 8px; }
        canvas { max-height: 280px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="text-center fw-bold mb-4">🏀 NBA 數據儀表板</h2>

        <div class="card mb-4 shadow-sm">
            <div class="card-body p-4">
                <form action="/" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">球隊</label>
                        <select name="team" class="form-select" onchange="this.form.submit()">
                            <option value="">-- 全部 --</option>
                            <option th:each="t : ${teamOptions}" th:value="${t}" th:text="${t}" th:selected="${t == selectedTeam}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">球員</label>
                        <select name="name" class="form-select" onchange="this.form.submit()">
                            <option value="none">-- 選擇球員 --</option>
                            <option th:each="p : ${playerOptions}" th:value="${p}" th:text="${p}" th:selected="${p == selectedName}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">賽季</label>
                        <select name="season" class="form-select" onchange="this.form.submit()">
                            <option th:each="s : ${seasonOptions}" th:value="${s}" th:text="${s}" th:selected="${s == selectedSeason}"></option>
                        </select>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${report != null}" class="row g-4">
            <div class="col-lg-4">
                <div class="card h-100 overflow-hidden">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 class="mb-0" th:text="${report.fullName}"></h4>
                        <small th:text="${report.season} + ' 賽季 | ' + ${report.team}"></small>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-2 mb-4">
                            <div class="col-4"><div class="stat-box"><p class="stat-label">PTS</p><p class="stat-val" th:text="${report.pts}"></p></div></div>
                            <div class="col-4"><div class="stat-box"><p class="stat-label">REB</p><p class="stat-val text-success" th:text="${report.reb}"></p></div></div>
                            <div class="col-4"><div class="stat-box"><p class="stat-label">AST</p><p class="stat-val text-info" th:text="${report.ast}"></p></div></div>
                            <div class="col-6"><div class="stat-box mt-1"><p class="stat-label">🛡️ 防守</p><p class="stat-val text-danger" th:text="${report.def}"></p></div></div>
                            <div class="col-6"><div class="stat-box mt-1"><p class="stat-label">⚡ 效率</p><p class="stat-val text-warning" th:text="${report.eff}"></p></div></div>
                        </div>
                        <div class="analysis-box p-3">
                            <h6 class="fw-bold mb-1" th:text="${report.coreStyle}"></h6>
                            <p class="small text-muted mb-0" th:text="${report.simpleRating}"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card h-100 p-4 shadow-sm">
                    <h6 class="text-center fw-bold text-muted mb-3">綜合能力分佈</h6>
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card h-100 p-4 shadow-sm">
                    <h6 class="text-center fw-bold text-muted mb-3">得分趨勢分析</h6>
                    <canvas id="historyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script th:if="${report != null}" th:inline="javascript">
        // 得分趨勢圖 - 確保數據存在
        const historyData = [[${report.ptsHistory}]];
        if(historyData && historyData.length > 0) {
            new Chart(document.getElementById('historyChart'), {
                type: 'line',
                data: {
                    labels: ['G1', 'G2', 'G3', 'G4', 'Current'],
                    datasets: [{
                        data: historyData,
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13, 110, 253, 0.1)',
                        fill: true, tension: 0.4
                    }]
                },
                options: { plugins: { legend: { display: false } }, responsive: true }
            });
        }

        // 雷達圖
        const radarData = [[${report.radarData}]];
        if(radarData && radarData.length > 0) {
            new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: ['得分', '籃板', '助攻', '防守', '效率'],
                    datasets: [{
                        data: radarData,
                        backgroundColor: 'rgba(255, 193, 7, 0.2)',
                        borderColor: '#ffc107',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: { r: { suggestedMin: 0, suggestedMax: 100, ticks: { display: false } } },
                    plugins: { legend: { display: false } },
                    responsive: true
                }
            });
        }
    </script>
</body>
</html>
