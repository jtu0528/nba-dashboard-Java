<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NBA Data Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center fw-bold mb-4 text-primary">🏀 NBA 數據分析儀表板 (Java Edition)</h2>

        <div class="card shadow border-0 mb-4">
            <div class="card-body p-4">
                <form id="nbaForm" action="/" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">1. 選擇球隊 (自動過濾球員)</label>
                        <select name="team" class="form-select border-primary" onchange="this.form.submit()">
                            <option value="">-- 全部球隊 --</option>
                            <option th:each="t : ${teamOptions}" th:value="${t}" th:text="${t}" th:selected="${t == selectedTeam}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">2. 選擇球員</label>
                        <select name="name" class="form-select border-primary" onchange="this.form.submit()">
                            <option value="none">-- 請選擇球員 --</option>
                            <option th:each="p : ${playerOptions}" th:value="${p}" th:text="${p}" th:selected="${p == selectedName}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">3. 指定賽季 (2000-2026)</label>
                        <select name="season" class="form-select border-primary" onchange="this.form.submit()">
                            <option th:each="s : ${seasonOptions}" th:value="${s}" th:text="${s}" th:selected="${s == selectedSeason}"></option>
                        </select>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${report == null}" class="text-center py-5 bg-white rounded shadow-sm">
            <p class="display-1 text-muted">📊</p>
            <h4 class="text-muted">等待分析指令</h4>
            <p class="small">請從上方選單選取欲調閱之 NBA 歷史數據</p>
        </div>

        <div th:if="${report != null}" class="row g-4">
            <div class="col-lg-5">
                <div class="card shadow border-0 text-center h-100">
                    <div class="card-header bg-dark text-white py-3">
                        <h4 class="mb-0" th:text="${report.fullName}"></h4>
                        <small th:text="${report.season} + ' 賽季 | ' + ${report.team}"></small>
                    </div>
                    <div class="card-body">
                        <div class="row my-4">
                            <div class="col-4 border-end"><h6>PTS</h6><p class="h3 fw-bold text-primary" th:text="${report.pts}"></p></div>
                            <div class="col-4 border-end"><h6>REB</h6><p class="h3 fw-bold text-success" th:text="${report.reb}"></p></div>
                            <div class="col-4"><h6>AST</h6><p class="h3 fw-bold text-info" th:text="${report.ast}"></p></div>
                        </div>
                        <div class="alert alert-warning h5 fw-bold" th:text="${report.coreStyle}"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card shadow border-0 p-3 h-100">
                    <h5 class="text-center mb-3">📈 得分趨勢動態分析</h5>
                    <canvas id="historyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script th:if="${report != null}" th:inline="javascript">
        new Chart(document.getElementById('historyChart'), {
            type: 'line',
            data: {
                labels: ['G1', 'G2', 'G3', 'G4', 'G5', 'Current'],
                datasets: [{
                    label: '賽季表現',
                    data: [[${report.ptsHistory}]],
                    borderColor: '#0d6efd',
                    backgroundColor: 'rgba(13, 110, 253, 0.05)',
                    fill: true,
                    tension: 0.4
                }]
            }
        });
    </script>
</body>
</html>
