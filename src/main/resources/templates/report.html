<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NBA Data Intelligence Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stat-box { background: #f8f9fa; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #dee2e6; }
        .stat-val { font-size: 1.8rem; font-weight: 800; color: #0d6efd; margin-bottom: 0; }
        .stat-label { font-size: 0.75rem; font-weight: bold; color: #6c757d; text-transform: uppercase; }
        .card { border: none; border-radius: 15px; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center fw-bold mb-4 text-primary">🏀 NBA 數據分析儀表板 (Java Edition)</h2>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-4">
                <form id="nbaForm" action="/" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold small text-muted">1. 選擇球隊</label>
                        <select name="team" class="form-select border-primary" onchange="this.form.submit()">
                            <option value="">-- 全部球隊 --</option>
                            <option th:each="t : ${teamOptions}" th:value="${t}" th:text="${t}" th:selected="${t == selectedTeam}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small text-muted">2. 選擇球員</label>
                        <select name="name" class="form-select border-primary" onchange="this.form.submit()">
                            <option value="none">-- 請選擇球員 --</option>
                            <option th:each="p : ${playerOptions}" th:value="${p}" th:text="${p}" th:selected="${p == selectedName}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small text-muted">3. 指定賽季</label>
                        <select name="season" class="form-select border-primary" onchange="this.form.submit()">
                            <option th:each="s : ${seasonOptions}" th:value="${s}" th:text="${s}" th:selected="${s == selectedSeason}"></option>
                        </select>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${report != null}" class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow border-0 h-100">
                    <div class="card-header bg-dark text-white py-3">
                        <h4 class="mb-0 text-center" th:text="${report.fullName}">球員姓名</h4>
                        <p class="text-center small mb-0 mt-1" th:text="${report.season} + ' 賽季 | ' + ${report.team}"></p>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-2 mb-4">
                            <div class="col-4"><div class="stat-box"><p class="stat-label">PTS</p><p class="stat-val" th:text="${report.pts}"></p></div></div>
                            <div class="col-4"><div class="stat-box"><p class="stat-label">REB</p><p class="stat-val text-success" th:text="${report.reb}"></p></div></div>
                            <div class="col-4"><div class="stat-box"><p class="stat-label">AST</p><p class="stat-val text-info" th:text="${report.ast}"></p></div></div>
                            <div class="col-6"><div class="stat-box"><p class="stat-label">🛡️ 防守評級</p><p class="stat-val text-danger" th:text="${report.def}"></p></div></div>
                            <div class="col-6"><div class="stat-box"><p class="stat-label">⚡ 效率指數</p><p class="stat-val text-warning" th:text="${report.eff}"></p></div></div>
                        </div>
                        <div class="alert alert-warning text-center fw-bold mb-0" th:text="${report.coreStyle}">分析中</div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow border-0 p-3 h-100 bg-white">
                    <h6 class="text-center fw-bold text-muted mb-2">🛡️ 綜合能力分佈 (雷達)</h6>
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow border-0 p-3 h-100 bg-white">
                    <h6 class="text-center fw-bold text-muted mb-2">📈 得分波動趨勢</h6>
                    <canvas id="historyChart"></canvas>
                </div>
            </div>
        </div>

        <div th:if="${report == null}" class="text-center py-5 bg-white rounded shadow-sm">
            <h3 class="text-muted">請完成上方選單選擇以開啟分析報告</h3>
        </div>
    </div>

    <script th:if="${report != null}" th:inline="javascript">
        // 1. 得分趨勢圖
        new Chart(document.getElementById('historyChart'), {
            type: 'line',
            data: {
                labels: ['G1', 'G2', 'G3', 'G4', 'Current'],
                datasets: [{
                    label: '得分',
                    data: [[${report.ptsHistory}]],
                    borderColor: '#0d6efd',
                    backgroundColor: 'rgba(13, 110, 253, 0.1)',
                    fill: true, tension: 0.4
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        // 2. 五角雷達圖 (更新標籤與數據)
        new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: {
                labels: ['得分', '籃板', '助攻', '防守', '效率'],
                datasets: [{
                    data: [[${report.radarData}]],
                    fill: true,
                    backgroundColor: 'rgba(255, 193, 7, 0.2)',
                    borderColor: '#ffc107',
                    pointBackgroundColor: '#ffc107',
                    borderWidth: 2
                }]
            },
            options: {
                scales: { r: { suggestedMin: 0, suggestedMax: 100, ticks: { display: false } } },
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
</html>
