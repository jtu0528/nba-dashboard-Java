<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NBA 球探報告</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2 th:text="${report.fullName} + ' 球探分析報告'">球員報告</h2>
            </div>
            <div class="card-body">
                <div class="row text-center mb-4">
                    <div class="col-md-4">
                        <h4>得分 (PTS)</h4>
                        <p class="display-6" th:text="${report.pts}">0.0</p>
                    </div>
                    <div class="col-md-4">
                        <h4>籃板 (REB)</h4>
                        <p class="display-6" th:text="${report.reb}">0.0</p>
                    </div>
                    <div class="col-md-4">
                        <h4>助攻 (AST)</h4>
                        <p class="display-6" th:text="${report.ast}">0.0</p>
                    </div>
                </div>
                <hr>
                <h5>風格分析：<span th:text="${report.coreStyle}">分析中...</span></h5>
            </div>
        </div>
        <p class="mt-3 text-center text-muted">提示：在網址後加上 ?name=球員名 即可查詢不同球員</p>
    </div>
</body>
</html>
