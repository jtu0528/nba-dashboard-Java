<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Real-time Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .stat-card { transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="text-center mb-5">
            <h2 class="display-5 fw-bold">🏀 NBA 球員數據分類系統</h2>
            <p class="text-muted">基於真實賽季數據的即時分類引擎</p>
        </div>

        <div class="row justify-content-center mb-5">
            <div class="col-md-6">
                <form action="/" method="get" class="input-group input-group-lg shadow-sm">
                    <input type="text" name="name" class="form-control border-0" placeholder="輸入英文姓名 (e.g. Stephen Curry)" required>
                    <button class="btn btn-primary px-4" type="submit">開始分析</button>
                </form>
            </div>
        </div>

        <div class="card shadow border-0 overflow-hidden">
            <div class="card-header bg-dark text-white py-4">
                <h2 class="mb-0 text-center" th:text="${report.fullName} + ' 分析報告'">球員報告</h2>
            </div>
            <div class="card-body bg-white p-5">
                <div class="row text-center">
                    <div class="col-md-4 mb-4">
                        <div class="p-3 bg-light rounded stat-card">
                            <h4 class="text-muted small text-uppercase">得分 (PTS)</h4>
                            <p class="display-4 fw-bold text-primary mb-0" th:text="${report.pts}">0.0</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="p-3 bg-light rounded stat-card">
                            <h4 class="text-muted small text-uppercase">籃板 (REB)</h4>
                            <p class="display-4 fw-bold text-success mb-0" th:text="${report.reb}">0.0</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="p-3 bg-light rounded stat-card">
                            <h4 class="text-muted small text-uppercase">助攻 (AST)</h4>
                            <p class="display-4 fw-bold text-info mb-0" th:text="${report.ast}">0.0</p>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4 p-4 border-start border-4 border-warning bg-light rounded shadow-sm text-center">
                    <h3 class="mb-2">專業定位</h3>
                    <div class="h2 fw-bold text-dark" th:text="${report.coreStyle}">分析中...</div>
                </div>
            </div>
        </div>
        
        <footer class="mt-5 text-center text-muted small">
            <p>Data Source: Balldontlie API | Developed for TKU Statistics Project</p>
        </footer>
    </div>
</body>
</html>
